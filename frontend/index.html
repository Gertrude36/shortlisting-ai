<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      ✅ FIX 1: favicon — prevents "Failed to load resource: 404" error in console.
      Place favicon.svg (or favicon.ico) in your /public folder.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback for browsers that don't support SVG favicons -->
    <link rel="alternate icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ✅ FIX 2: "SES Removing unpermitted intrinsics" warning.
      This is caused by Vercel injecting its own lockdown.js (SES/Hardened JS)
      into the page for security. It is NOT an error — just a console warning.

      To suppress it cleanly, add this meta tag. It tells SES which globals
      your app legitimately needs so it won't log warnings about them.

      If the warning still appears after this, it is safe to ignore —
      it does NOT affect functionality. It is Vercel's security hardening.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        connect-src 'self' https://*.onrender.com https://api.resend.com;
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: blob:;
        font-src    'self';
      "
    />

    <title>Shortlisting AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
