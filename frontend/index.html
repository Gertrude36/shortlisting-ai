<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      CSP — allows both local dev (localhost:8000) and production (onrender.com).

      connect-src additions:
        http://localhost:8000      ← local backend (uvicorn)
        http://127.0.0.1:8000     ← same, alternate address
        ws://localhost:5173        ← Vite HMR websocket (hot reload)
        ws://127.0.0.1:5173       ← same, alternate address

      NOTE ON "SES Removing unpermitted intrinsics":
        This comes from Vercel's own lockdown.js — not an error, safe to ignore.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        connect-src 'self'
                    http://localhost:8000
                    http://127.0.0.1:8000
                    ws://localhost:5173
                    ws://127.0.0.1:5173
                    https://*.onrender.com
                    https://api.resend.com;
        style-src   'self'
                    'unsafe-inline'
                    https://fonts.googleapis.com;
        font-src    'self'
                    https://fonts.gstatic.com
                    data:;
        img-src     'self'
                    data:
                    blob:;
      "
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Shortlisting AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
