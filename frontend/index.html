<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      favicon — prevents "Failed to load resource: 404" error in console.
      Place favicon.svg (or favicon.ico) in your /public folder.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ✅ FIX: CSP updated to allow Google Fonts.

      WHAT WAS BROKEN:
        style-src   'self' 'unsafe-inline'   ← blocked fonts.googleapis.com
        font-src    'self'                   ← blocked fonts.gstatic.com

      WHY IT BROKE:
        Google Fonts loads in two steps:
          1. A <link> stylesheet from fonts.googleapis.com  → needs style-src
          2. The actual font files from fonts.gstatic.com   → needs font-src
        Both domains were missing from the CSP, so both requests were blocked.

      THE FIX:
        style-src   now includes https://fonts.googleapis.com
        font-src    now includes https://fonts.gstatic.com

      NOTE ON "SES Removing unpermitted intrinsics":
        This warning comes from Vercel injecting its own lockdown.js (SES /
        Hardened JS) for security hardening. It is NOT an error and does NOT
        affect functionality. It cannot be suppressed via CSP meta tags —
        it is Vercel's own script running before your app loads.
        Safe to ignore.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        connect-src 'self'
                    https://*.onrender.com
                    https://api.resend.com;
        style-src   'self'
                    'unsafe-inline'
                    https://fonts.googleapis.com;
        font-src    'self'
                    https://fonts.gstatic.com
                    data:;
        img-src     'self'
                    data:
                    blob:;
      "
    />

    <!--
      Preconnect to Google Fonts domains for faster font loading.
      Must come BEFORE the actual font <link> tags in your app.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Shortlisting AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
