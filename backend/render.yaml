## render.yaml
##
## ROOT CAUSE OF DATA LOSS:
##   startCommand used --port 10000 (hardcoded) instead of $PORT.
##   Render injects the correct port via $PORT at runtime.
##   Hardcoding caused Render to sometimes not detect the open port,
##   restart the service, and wipe the ephemeral SQLite file each time.
##
##   Also: if DATABASE_URL was never linked, the app fell back to SQLite
##   silently — all data stored in a file that resets on every deploy.
##
## FIX:
##   ✅ startCommand now uses $PORT
##   ✅ DATABASE_URL auto-linked from PostgreSQL db — persistent forever
##
## ONE-TIME SETUP AFTER PUSHING THIS FILE:
##   1. Push to GitHub
##   2. Render Dashboard → New → Blueprint → connect your repo
##      (or if already deployed: it will detect the yaml change)
##   3. Manually set these in Render Dashboard → Environment:
##        SECRET_KEY    → openssl rand -hex 32
##        MAIL_USERNAME → your@gmail.com
##        MAIL_PASSWORD → Gmail App Password (16 chars)
##        MAIL_FROM     → your@gmail.com
##   4. Manual Deploy → Deploy latest commit

services:
  - type: web
    name: shortlisting-ai-backend
    env: python
    region: oregon
    plan: free

    # ✅ FIX: Call render-build.sh instead of running apt-get inline.
    # The inline buildCommand never called the script, so French language
    # packs were missing and the CPU-only torch trick was skipped.
    buildCommand: chmod +x render-build.sh && ./render-build.sh

    # ✅ THE KEY FIX: $PORT not 10000
    # Render injects the correct port via $PORT — hardcoding breaks port detection
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ✅ This is what makes data persist across ALL deploys.
      # Render auto-populates DATABASE_URL from the PostgreSQL db below.
      # Your database.py reads this and connects to PostgreSQL instead of SQLite.
      - key: DATABASE_URL
        fromDatabase:
          name: shortlisting-ai-db
          property: connectionString

      # Set manually in Render Dashboard → Environment
      # Generate: openssl rand -hex 32
      - key: SECRET_KEY
        sync: false

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: FRONTEND_URL
        value: https://shortlisting-ai.vercel.app

      - key: ALLOWED_ORIGINS
        value: "https://shortlisting-ai.vercel.app,http://localhost:5173,http://localhost:3000"

      # ── Mail — set these manually in Render Dashboard ─────────────────────
      - key: MAIL_SERVER
        value: smtp.gmail.com

      - key: MAIL_PORT
        value: "465"

      - key: MAIL_FROM_NAME
        value: Shortlisting AI

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      - key: MAIL_FROM
        sync: false

      # ── HuggingFace ───────────────────────────────────────────────────────
      - key: HF_TOKEN
        sync: false

      - key: HF_HUB_DISABLE_IMPLICIT_TOKEN
        value: "1"

      - key: TRANSFORMERS_VERBOSITY
        value: error

      - key: HF_HUB_VERBOSITY
        value: error

      - key: TOKENIZERS_PARALLELISM
        value: "false"

      # ── OCR ───────────────────────────────────────────────────────────────
      - key: TESSERACT_CMD
        value: tesseract

      - key: POPPLER_PATH
        value: ""

# ✅ Free PostgreSQL — data persists across ALL deploys forever
# Free tier: 1 GB storage, 97 connection limit
databases:
  - name: shortlisting-ai-db
    plan: free
    region: oregon