# render.yaml — v5.0.0
#
# FIXES IN THIS VERSION:
#
#   ✅ FIX 1 — Added initialDelaySeconds: 60
#              Render was probing /health BEFORE uvicorn was even bound to
#              the port, causing the service to be marked unhealthy and
#              cycled. 60s gives the app time to load ML models + bind.
#
#   ✅ FIX 2 — healthCheckPath: /health (retained)
#              /health always returns HTTP 200 with ready: true/false in body.
#
#   ✅ FIX 3 — maxShutdownDelaySeconds: 30
#              Raised from 20 → 30 to cover the full OCR+AI pipeline which
#              can take up to 25s on free tier. Prevents mid-flight cuts.
#
#   ✅ FIX 4 — numInstances: 1 (retained, free tier limit)
#
#   ✅ FIX 5 — Removed CORS_ALLOW_ORIGINS from envVars — CORS is handled
#              entirely in main.py and does not need a runtime env var.

services:
  - type: web
    name: shortlisting-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    branch: main
    rootDir: backend

    # Probe /health — returns 200 even during startup (ready field varies).
    # initialDelaySeconds tells Render to wait before the FIRST probe, so
    # uvicorn has time to bind the port and load the ML models.
    healthCheckPath: /health
    initialDelaySeconds: 60

    # Gives in-flight document uploads / OCR / AI jobs time to finish
    # before the dyno is killed on redeploy.
    maxShutdownDelaySeconds: 30

    # Free tier = 1 instance only.
    numInstances: 1

    envVars:
      - fromGroup: shortlisting-env
      # Explicit upload path — avoids the ./uploads relative fallback.
      - key: UPLOAD_DIR
        value: /tmp/uploads