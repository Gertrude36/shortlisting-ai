services:
  - type: web
    name: shortlisting-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    branch: main
    rootDir: backend
    # ✅ FIX: Tell Render to wait until /health returns 200 before routing traffic.
    # Without this, cold-start requests arrive before FastAPI is ready → 502s.
    healthCheckPath: /health
    envVars:
      - fromGroup: shortlisting-env